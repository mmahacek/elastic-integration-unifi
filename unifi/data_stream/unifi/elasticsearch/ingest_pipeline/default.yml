          ignore_missing: true
          ignore_failure: true
          override: false
    - rename:
          tag: rename_cef_extensions_destinationAddress_to_destination_address_2a6c9211
          field: cef.extensions.destinationAddress
          target_field: destination.address
          if: ctx.cef?.extensions?.destinationAddress != null && ctx.destination?.address == null
          ignore_missing: true
          ignore_failure: true
          override: false
    - rename:
          tag: rename_cef_extensions_destinationPort_to_destination_port_403b90c0
          field: cef.extensions.destinationPort
          target_field: destination.port
          if: ctx.cef?.extensions?.destinationPort != null && ctx.destination?.port == null
          ignore_missing: true
          ignore_failure: true
