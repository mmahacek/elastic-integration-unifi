---
description: Pipeline for Unifi activity logs.
processors:
    #
    # Timestamp parsing.
    #
    - set:
          tag: set_event_timezone
          field: event.timezone
          copy_from: _conf.tz_offset
          if: ctx._conf?.tz_offset instanceof String && !ctx._conf.tz_offset.equalsIgnoreCase('local')
    - grok:
          description: Extract timestamp from log header when deviceReceiptTime not given.
          if: ctx?.cef?.extensions?.deviceReceiptTime == null
          field: event.original
          ignore_failure: true
          pattern_definitions:
              ECS_SYSLOG_PRI: "<%{NONNEGINT:log.syslog.priority:long}>"
              SYSLOG_TIMESTAMP: (?:%{SYSLOGTIMESTAMP:_tmp.timestamp}|%{TIMESTAMP_ISO8601:_tmp.timestamp8601})
          patterns:
              - "^%{SYSLOG_TIMESTAMP} "
              - "^%{ECS_SYSLOG_PRI}%{SYSLOG_TIMESTAMP} " # RFC3164
              - "^%{ECS_SYSLOG_PRI}%{NONNEGINT} %{SYSLOG_TIMESTAMP} " # RFC5224
          tag: timestamp extract grok

    - grok:
          description: split data to prep for non_CEF KV data
          tag: non_cef_grok_to_split_rules
          field: message
          ignore_failure: true
          ignore_missing: true
          patterns:
              - \[%{GREEDYDATA:_tmp.text}\] DESCR="%{DATA:unifi.rule}" %{GREEDYDATA:_tmp.message}
    - kv:
          tag: kv_split_rule_fields
          field: _tmp.message
          field_split: " "
          value_split: "="
          ignore_failure: true

    - date:
          tag: date__tmp_timestamp8601
          if: ctx?._tmp?.timestamp8601 != null
          field: _tmp.timestamp8601
          formats:
              - ISO8601
    - date:
          tag: date__tmp_timestamp
          if: ctx?._tmp?.timestamp != null
          field: _tmp.timestamp
          formats:
              - MMM  d HH:mm:ss
              - MMM dd HH:mm:ss
          timezone: "{{{event.timezone}}}"
    - remove:
          tag: remove_event_original
          if: ctx?.tags == null || !(ctx.tags.contains('preserve_original_event'))
          field: event.original
          ignore_failure: true
          ignore_missing: true
    - append:
          tag: append_preserve_original_event_on_error
          field: tags
          value: preserve_original_event
          allow_duplicates: false
          if: ctx.error?.message != null
    - rename:
          tag: rename_unfi_event_id
          field: cef.device.event_class_id
          target_field: unifi.event.id
          if: ctx.cef?.device?.event_class_id != null
    - rename:
          tag: rename_unfi_event_name
          field: cef.name
          target_field: unifi.event.name
          if: ctx.cef?.name != null
    - rename:
          tag: rename_unfi_hostname
          field: log.syslog.hostname
          target_field: observer.hostname
          if: ctx.log?.syslog?.hostname != null && ctx.observer?.hostname == null
    - rename:
          tag: rename_destination_address
          field: DST
          target_field: destination.address
          if: ctx.DST != null
          ignore_missing: true
          ignore_failure: true
          override: false
    - rename:
          tag: rename_destination_port
          field: DPT
          target_field: destination.port
          if: ctx.DPT != null
          ignore_missing: true
          ignore_failure: true
          override: false
    - rename:
          tag: rename_source_address
          field: SRC
          target_field: source.address
