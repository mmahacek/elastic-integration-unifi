title: "System Logging / SIEM"
type: logs
streams:
  - input: udp
    title: "System Logging / SIEM"
    description: Collect Unifi logs in CEF format using UDP input
    template_path: udp.yml.hbs
    vars:
      - name: listen_address
        type: text
        title: "Listen Address"
        description: |-
          Bind address for the listener. Use 0.0.0.0 to listen on all interfaces.
        required: true
        show_user: true
        default: localhost
      - name: listen_port
        type: text
        title: "Listen Port"
        description: |-
          Bind port for the listener.
        required: true
        show_user: true
        default: 9040
      - name: decode_cef_timezone
        title: CEF Timezone
        type: text
        description: IANA time zone or time offset (e.g. `+0200`) to use when interpreting timestamps without a time zone in the CEF message.
        required: false
        show_user: false
        multi: false
      - name: processors
        type: yaml
        title: "Processors"
        description: |-
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.
        required: false
        show_user: false
        multi: false
      - name: ignore_empty_values
        title: Ignore Empty Values
        type: bool
        description: Ignore CEF fields that are empty. The alternative behavior is to treat an empty field as an error.
        required: true
        show_user: false
        multi: false
        default: false
      - name: tags
        type: text
        title: "Tags"
        description: |-
          Tags to include in the published event
        multi: true
        show_user: true
      - name: preserve_original_event
        type: bool
        title: "Preserve original event"
        description: |-
          Preserves a raw copy of the original event, added to the field `event.original`.
        required: true
        show_user: true
        default: false
