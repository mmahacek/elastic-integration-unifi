format_version: 3.5.4
name: unifi
title: "UniFi"
version: 0.0.21
source:
  license: "Elastic-2.0"
description: "Collect logs from Unifi devices with Elastic Agent."
type: integration
categories:
  - security
  - network
conditions:
  kibana:
    version: "^8.18.0 || ^9.0.0"
  elastic:
    subscription: "basic"
screenshots:
  - src: /img/unifi.png
    title: Unifi Logo
    size: 600x600
    type: image/png
icons:
  - src: /img/unifi_logo.svg
    title: Unifi logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: unifi
    title: Unifi Network Logs
    description: Collect activity logs
    inputs:
      - type: udp
        title: Collect activity logs via UDP input
        description: Collecting activity logs
owner:
  github: mmahacek/elastic-integration-unifi
  type: community
